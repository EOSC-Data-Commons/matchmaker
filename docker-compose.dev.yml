services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - PORT=5173
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./server.ts:/app/server.ts
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./package.json:/app/package.json
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./index.html:/app/index.html
    command: npm run dev
    depends_on:
      - backend
  backend:
    image: data-commons-mcp-mcp
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=debug
    env_file:
      - keys.env
